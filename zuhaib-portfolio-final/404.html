<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>404 — Page not found | Zuhaib Wani</title>
<meta name="robots" content="noindex"/>
<style>
  :root{--bg:#0a0b0f;--ink:#f2f3f5;--ink-2:#a4a9b4;--accent:#ff5c35;--line:#22262f}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;overflow:hidden;position:relative}
  .glow{position:absolute;top:-30%;left:50%;transform:translateX(-50%);width:680px;height:680px;
    background:radial-gradient(circle,rgba(255,92,53,.16),transparent 62%);pointer-events:none}
  .wrap{position:relative;max-width:520px}
  .code{font-size:clamp(96px,22vw,180px);font-weight:800;line-height:1;letter-spacing:-2px;
    background:linear-gradient(180deg,var(--ink),#7a7f8b);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .code span{color:var(--accent);-webkit-text-fill-color:var(--accent)}
  h1{font-size:clamp(18px,4.5vw,24px);font-weight:600;margin:18px 0 10px}
  p{color:var(--ink-2);font-size:15px;line-height:1.6;max-width:380px;margin:0 auto 30px}
  .home{display:inline-flex;align-items:center;gap:9px;min-height:48px;padding:0 26px;border-radius:100px;
    background:var(--accent);color:#0a0b0f;font-weight:600;font-size:15px;text-decoration:none;transition:transform .2s,box-shadow .2s;
    box-shadow:0 12px 30px rgba(255,92,53,.28)}
  .home:hover{transform:translateY(-2px);box-shadow:0 16px 40px rgba(255,92,53,.4)}
  .name{position:absolute;bottom:28px;left:0;right:0;text-align:center;color:var(--ink-2);font-size:13px;letter-spacing:.04em}
  .name a{color:var(--ink);text-decoration:none}
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="wrap">
    <div class="code">4<span>0</span>4</div>
    <h1>This page wandered off the canvas.</h1>
    <p>The link is broken or the page has moved. Let's get you back to the work.</p>
    <a class="home" href="/">← Back to portfolio</a>
  </div>
  <div class="name"><a href="/">Zuhaib Wani</a> — Senior Creative Designer</div>
</body>
</html>
